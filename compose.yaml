services:
  postgres:
    image: postgres:16-alpine
    container_name: yapd-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: yapd
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - yapd-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d yapd"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  yapd-postgres-data:

services:
  postgres:
    image: postgres:16-alpine
    container_name: yapd-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: yapd
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - yapd-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d yapd"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: yapd-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      API_HOST: 0.0.0.0
      API_PORT: 3001
      WEB_ORIGIN: ${WEB_ORIGIN:-http://localhost:3000}
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/yapd?schema=public}
      SESSION_SECRET: ${SESSION_SECRET:-replace-this-session-secret}
      APP_ENCRYPTION_KEY: ${APP_ENCRYPTION_KEY:-replace-this-encryption-key}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      SWAGGER_ENABLED: ${SWAGGER_ENABLED:-false}
      YAPD_DB_MIGRATION_MAX_ATTEMPTS: ${YAPD_DB_MIGRATION_MAX_ATTEMPTS:-30}
      YAPD_DB_MIGRATION_RETRY_DELAY_SECONDS: ${YAPD_DB_MIGRATION_RETRY_DELAY_SECONDS:-2}
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001/api/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  yapd-postgres-data:
